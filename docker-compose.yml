services:
  postgres:
    image: postgres:16-alpine
    container_name: aggregram-db
    env_file: ./apps/api/.env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-telegram_crawler}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-telegram_crawler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram_crawler"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aggregram-redis
    env_file: ./apps/api/.env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: aggregram-api
    env_file: ./apps/api/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "80:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data: